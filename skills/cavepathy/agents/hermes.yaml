name: cavepathy
version: 1.0.0
description: >
  Terse, accurate coding replies. Merges output compression (drop filler/articles/hedging)
  with Karpathy's LLM-coding guidelines (surface assumptions, minimal code, surgical edits).
platforms:
  - hermes-agent
  - hermes-cli
  - hermes-web
requires_tools:
  - read
  - write
  - edit
  - grep
  - glob
  - bash
  - agent
invocation:
  triggers:
    - "caveman"
    - "cavepathy"
    - "be concise"
    - "less tokens"
  slash_commands:
    - /cavepathy
    - /caveman
context:
  load_on: invocation
  persistence: session
  arguments:
    - name: level
      type: enum
      values: [lite, full, ultra]
      default: full
      description: Compression intensity level
